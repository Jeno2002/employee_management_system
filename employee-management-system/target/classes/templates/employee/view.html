<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Employee Details - EMS')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container-fluid px-4">

        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h1 class="page-title">Employee Details</h1>
                <p class="page-subtitle">Full profile information</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/employees/{id}/edit(id=${employee.id})}" class="btn btn-primary">
                    <i class="bi bi-pencil me-1"></i>Edit
                </a>
                <a th:href="@{/employees}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>
        </div>

        <div class="row g-4">
            <!-- Profile Card -->
            <div class="col-12 col-lg-4">
                <div class="card h-100 text-center">
                    <div class="card-body py-5">
                        <div class="avatar avatar-xl mx-auto mb-3"
                             th:text="${#strings.substring(employee.firstName,0,1) + #strings.substring(employee.lastName,0,1)}">
                        </div>
                        <h4 class="mb-1" th:text="${employee.firstName + ' ' + employee.lastName}"></h4>
                        <p class="text-muted mb-3" th:text="${employee.jobTitle}"></p>
                        <span th:class="${employee.status.name() == 'ACTIVE'} ? 'badge badge-active fs-6' : (${employee.status.name() == 'INACTIVE'} ? 'badge badge-inactive fs-6' : 'badge badge-leave fs-6')"
                              th:text="${employee.status}">
                        </span>

                        <hr class="my-4"/>

                        <div class="d-flex flex-column gap-2 text-start">
                            <div class="detail-row">
                                <i class="bi bi-envelope text-muted"></i>
                                <span th:text="${employee.email}"></span>
                            </div>
                            <div class="detail-row">
                                <i class="bi bi-telephone text-muted"></i>
                                <span th:text="${employee.phone}"></span>
                            </div>
                            <div class="detail-row">
                                <i class="bi bi-diagram-3 text-muted"></i>
                                <span th:text="${employee.department}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Details Card -->
            <div class="col-12 col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="bi bi-info-circle me-2"></i>Employment Details</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-4">
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Employee ID</label>
                                <p class="detail-value" th:text="'#EMP-' + ${employee.id}"></p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Full Name</label>
                                <p class="detail-value" th:text="${employee.firstName + ' ' + employee.lastName}"></p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Email Address</label>
                                <p class="detail-value" th:text="${employee.email}"></p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Phone Number</label>
                                <p class="detail-value" th:text="${employee.phone}"></p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Department</label>
                                <p class="detail-value">
                                    <span class="badge badge-dept" th:text="${employee.department}"></span>
                                </p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Job Title</label>
                                <p class="detail-value" th:text="${employee.jobTitle}"></p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Salary</label>
                                <p class="detail-value salary-value"
                                   th:text="${'$' + #numbers.formatDecimal(employee.salary, 1, 'COMMA', 0, 'POINT')}">
                                </p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Hire Date</label>
                                <p class="detail-value" th:text="${#temporals.format(employee.hireDate, 'MMMM dd, yyyy')}"></p>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="detail-label">Status</label>
                                <p class="detail-value">
                                    <span th:class="${employee.status.name() == 'ACTIVE'} ? 'badge badge-active' : (${employee.status.name() == 'INACTIVE'} ? 'badge badge-inactive' : 'badge badge-leave')"
                                          th:text="${employee.status}">
                                    </span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions Card -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Danger Zone</h5>
                    </div>
                    <div class="card-body d-flex align-items-center justify-content-between">
                        <div>
                            <p class="mb-0 fw-semibold">Delete Employee</p>
                            <small class="text-muted">This action cannot be undone.</small>
                        </div>
                        <form th:action="@{/employees/{id}/delete(id=${employee.id})}" method="post"
                              onsubmit="return confirm('Are you sure? This cannot be undone.')">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
