<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Error - EMS')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="text-center">
        <div class="error-icon mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h1 class="display-4 fw-bold mb-3">Oops!</h1>
        <p class="lead text-muted mb-2">Something went wrong.</p>
        <p class="text-danger mb-4" th:text="${errorMessage}">An error occurred.</p>
        <div class="d-flex gap-3 justify-content-center">
            <a th:href="@{/employees}" class="btn btn-primary px-4">
                <i class="bi bi-people me-2"></i>Go to Employees
            </a>
            <a th:href="@{/employees/dashboard}" class="btn btn-outline-secondary px-4">
                <i class="bi bi-grid me-2"></i>Dashboard
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
