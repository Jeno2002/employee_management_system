<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <!-- ✅ FIXED LINE -->
    <title th:text="${title}">EMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>

<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/employees/dashboard}">
            <div class="brand-icon">
                <i class="bi bi-people-fill"></i>
            </div>
            <span class="brand-text">EMS<span class="brand-dot">.</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/employees/dashboard}">
                        <i class="bi bi-grid-fill me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/employees}">
                        <i class="bi bi-people me-1"></i>Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn-add-nav" th:href="@{/employees/new}">
                        <i class="bi bi-plus-circle-fill me-1"></i>Add Employee
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Alert Fragment -->
<div th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="footer mt-auto py-3">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center">
            <span class="footer-text">
                <i class="bi bi-people-fill me-1"></i>
                Employee Management System &copy; 2024
            </span>
            <span class="footer-text">Built with Spring Boot + Thymeleaf + MySQL</span>
        </div>
    </div>
</footer>
</html>
