<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Employees - EMS')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container-fluid px-4">

        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h1 class="page-title">Employees</h1>
                <p class="page-subtitle" th:text="'Showing ' + ${totalItems} + ' employee(s)'"></p>
            </div>
            <a th:href="@{/employees/new}" class="btn btn-primary btn-add">
                <i class="bi bi-plus-lg me-2"></i>Add Employee
            </a>
        </div>

        <!-- Alerts -->
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Search & Filter Bar -->
        <div class="card filter-card mb-4">
            <div class="card-body">
                <form th:action="@{/employees}" method="get" class="row g-3 align-items-end">
                    <div class="col-12 col-md-5">
                        <label class="form-label">Search</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" name="search" class="form-control"
                                   placeholder="Search by name or email..."
                                   th:value="${search}"/>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Department</label>
                        <select name="department" class="form-select">
                            <option value="">All Departments</option>
                            <option th:each="dept : ${departments}"
                                    th:value="${dept}"
                                    th:text="${dept}"
                                    th:selected="${dept == department}">
                            </option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3 d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-funnel me-1"></i>Filter
                        </button>
                        <a th:href="@{/employees}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Employee Table -->
        <div class="card">
            <div class="card-body p-0">
                <div th:if="${employees.isEmpty()}" class="empty-state py-5">
                    <i class="bi bi-people fs-1"></i>
                    <h5 class="mt-3">No Employees Found</h5>
                    <p class="text-muted">Try adjusting your search or add a new employee.</p>
                    <a th:href="@{/employees/new}" class="btn btn-primary mt-2">
                        <i class="bi bi-plus-lg me-1"></i>Add Employee
                    </a>
                </div>

                <div th:unless="${employees.isEmpty()}" class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>
                                <a th:href="@{/employees(sortBy='firstName', sortDir=${sortBy == 'firstName' && sortDir == 'asc' ? 'desc' : 'asc'}, search=${search}, department=${department})}"
                                   class="sort-link">
                                    Name
                                    <i th:classappend="${sortBy == 'firstName'} ? (${sortDir == 'asc'} ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up'"
                                       class="bi ms-1"></i>
                                </a>
                            </th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Job Title</th>
                            <th>
                                <a th:href="@{/employees(sortBy='salary', sortDir=${sortBy == 'salary' && sortDir == 'asc' ? 'desc' : 'asc'}, search=${search}, department=${department})}"
                                   class="sort-link">
                                    Salary
                                    <i th:classappend="${sortBy == 'salary'} ? (${sortDir == 'asc'} ? 'bi-sort-up' : 'bi-sort-down') : 'bi-arrow-down-up'"
                                       class="bi ms-1"></i>
                                </a>
                            </th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="emp, iter : ${employees}">
                            <td th:text="${iter.index + 1 + currentPage * 10}" class="text-muted"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="avatar" th:text="${#strings.substring(emp.firstName,0,1) + #strings.substring(emp.lastName,0,1)}"></div>
                                    <div>
                                        <div class="fw-semibold" th:text="${emp.firstName + ' ' + emp.lastName}"></div>
                                        <small class="text-muted" th:text="${emp.phone}"></small>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${emp.email}"></td>
                            <td><span class="badge badge-dept" th:text="${emp.department}"></span></td>
                            <td th:text="${emp.jobTitle}"></td>
                            <td th:text="${'$' + #numbers.formatDecimal(emp.salary, 1, 'COMMA', 0, 'POINT')}"></td>
                            <td>
                                <span th:class="${emp.status.name() == 'ACTIVE'} ? 'badge badge-active' : (${emp.status.name() == 'INACTIVE'} ? 'badge badge-inactive' : 'badge badge-leave')"
                                      th:text="${emp.status}">
                                </span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/employees/{id}(id=${emp.id})}" class="btn btn-sm btn-icon btn-view" title="View">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/employees/{id}/edit(id=${emp.id})}" class="btn btn-sm btn-icon btn-edit" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/employees/{id}/delete(id=${emp.id})}" method="post"
                                          onsubmit="return confirm('Are you sure you want to delete this employee?')">
                                        <button type="submit" class="btn btn-sm btn-icon btn-delete" title="Delete">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center px-4 py-3 border-top">
                    <span class="text-muted small"
                          th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></span>
                    <nav>
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? disabled">
                                <a class="page-link"
                                   th:href="@{/employees(page=${currentPage - 1}, search=${search}, department=${department}, sortBy=${sortBy}, sortDir=${sortDir})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                th:classappend="${i == currentPage} ? active">
                                <a class="page-link" th:text="${i + 1}"
                                   th:href="@{/employees(page=${i}, search=${search}, department=${department}, sortBy=${sortBy}, sortDir=${sortDir})}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? disabled">
                                <a class="page-link"
                                   th:href="@{/employees(page=${currentPage + 1}, search=${search}, department=${department}, sortBy=${sortBy}, sortDir=${sortDir})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
