<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Dashboard - EMS')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container-fluid px-4">

        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle">Welcome back! Here's what's happening.</p>
            </div>
            <a th:href="@{/employees/new}" class="btn btn-primary btn-add">
                <i class="bi bi-plus-lg me-2"></i>Add Employee
            </a>
        </div>

        <!-- Alerts -->
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Stat Cards -->
        <div class="row g-4 mb-4">
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="stat-card stat-card--blue">
                    <div class="stat-card__icon">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div class="stat-card__body">
                        <p class="stat-card__label">Total Employees</p>
                        <h2 class="stat-card__value" th:text="${totalEmployees}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="stat-card stat-card--green">
                    <div class="stat-card__icon">
                        <i class="bi bi-person-check-fill"></i>
                    </div>
                    <div class="stat-card__body">
                        <p class="stat-card__label">Active Employees</p>
                        <h2 class="stat-card__value" th:text="${activeEmployees}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="stat-card stat-card--purple">
                    <div class="stat-card__icon">
                        <i class="bi bi-diagram-3-fill"></i>
                    </div>
                    <div class="stat-card__body">
                        <p class="stat-card__label">Departments</p>
                        <h2 class="stat-card__value" th:text="${departments.size()}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="stat-card stat-card--orange">
                    <div class="stat-card__icon">
                        <i class="bi bi-person-x-fill"></i>
                    </div>
                    <div class="stat-card__body">
                        <p class="stat-card__label">Inactive</p>
                        <h2 class="stat-card__value"
                            th:text="${totalEmployees - activeEmployees}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dept Breakdown -->
        <div class="row g-4">
            <div class="col-12 col-lg-6">
                <div class="card h-100">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="bi bi-bar-chart-fill me-2"></i>Employees by Department</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${deptCounts.isEmpty()}" class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <p>No departments yet. Start by adding employees.</p>
                        </div>
                        <div th:each="entry : ${deptCounts}" class="dept-bar-row mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="dept-label" th:text="${entry.key}">Dept</span>
                                <span class="dept-count" th:text="${entry.value} + ' employees'">0</span>
                            </div>
                            <div class="progress" style="height:8px;">
                                <div class="progress-bar"
                                     th:style="'width: ' + (${entry.value} * 100 / ${totalEmployees}) + '%'"
                                     role="progressbar"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6">
                <div class="card h-100">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="bi bi-diagram-3 me-2"></i>Departments</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${departments.isEmpty()}" class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <p>No departments yet.</p>
                        </div>
                        <div class="dept-tags">
                            <a th:each="dept : ${departments}"
                               th:href="@{/employees(department=${dept})}"
                               th:text="${dept}"
                               class="dept-tag">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
