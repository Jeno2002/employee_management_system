<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(${isEdit ? 'Edit Employee - EMS' : 'New Employee - EMS'})}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container-fluid px-4">

        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h1 class="page-title" th:text="${isEdit ? 'Edit Employee' : 'Add New Employee'}"></h1>
                <p class="page-subtitle">Fill in the details below</p>
            </div>
            <a th:href="@{/employees}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>

        <!-- Alerts -->
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Form -->
        <div class="row justify-content-center">
            <div class="col-12 col-xl-9">
                <div class="card">
                    <div class="card-body p-4">
                        <form th:action="${isEdit ? '/employees/' + employee.id + '/edit' : '/employees/new'}"
                              th:object="${employee}" method="post" novalidate>

                            <!-- Personal Info -->
                            <h6 class="section-title mb-3">
                                <i class="bi bi-person me-2"></i>Personal Information
                            </h6>
                            <div class="row g-3 mb-4">
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">First Name</label>
                                    <input type="text" class="form-control"
                                           th:field="*{firstName}"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                           placeholder="e.g. John"/>
                                    <div class="invalid-feedback" th:errors="*{firstName}"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Last Name</label>
                                    <input type="text" class="form-control"
                                           th:field="*{lastName}"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                           placeholder="e.g. Doe"/>
                                    <div class="invalid-feedback" th:errors="*{lastName}"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Email Address</label>
                                    <input type="email" class="form-control"
                                           th:field="*{email}"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                           placeholder="e.g. john.doe@company.com"/>
                                    <div class="invalid-feedback" th:errors="*{email}"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Phone Number</label>
                                    <input type="text" class="form-control"
                                           th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                           placeholder="e.g. +91 9876543210"/>
                                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                                </div>
                            </div>

                            <hr class="my-4"/>

                            <!-- Job Info -->
                            <h6 class="section-title mb-3">
                                <i class="bi bi-briefcase me-2"></i>Job Information
                            </h6>
                            <div class="row g-3 mb-4">
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Department</label>
                                    <input type="text" class="form-control"
                                           th:field="*{department}"
                                           th:classappend="${#fields.hasErrors('department')} ? 'is-invalid'"
                                           placeholder="e.g. Engineering"/>
                                    <div class="invalid-feedback" th:errors="*{department}"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Job Title</label>
                                    <input type="text" class="form-control"
                                           th:field="*{jobTitle}"
                                           th:classappend="${#fields.hasErrors('jobTitle')} ? 'is-invalid'"
                                           placeholder="e.g. Software Engineer"/>
                                    <div class="invalid-feedback" th:errors="*{jobTitle}"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Salary (USD)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" class="form-control"
                                               th:field="*{salary}"
                                               th:classappend="${#fields.hasErrors('salary')} ? 'is-invalid'"
                                               placeholder="e.g. 75000" min="0" step="1000"/>
                                        <div class="invalid-feedback" th:errors="*{salary}"></div>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label required">Hire Date</label>
                                    <input type="date" class="form-control"
                                           th:field="*{hireDate}"
                                           th:classappend="${#fields.hasErrors('hireDate')} ? 'is-invalid'"/>
                                    <div class="invalid-feedback" th:errors="*{hireDate}"></div>
                                </div>
                                <div class="col-12 col-md-6" th:if="${isEdit}">
                                    <label class="form-label">Status</label>
                                    <select class="form-select" th:field="*{status}">
                                        <option th:each="s : ${statuses}"
                                                th:value="${s}"
                                                th:text="${s}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="d-flex justify-content-end gap-3 pt-2">
                                <a th:href="@{/employees}" class="btn btn-outline-secondary px-4">Cancel</a>
                                <button type="submit" class="btn btn-primary px-5">
                                    <i th:classappend="${isEdit} ? 'bi-save' : 'bi-plus-lg'" class="bi me-2"></i>
                                    <span th:text="${isEdit ? 'Save Changes' : 'Add Employee'}"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
